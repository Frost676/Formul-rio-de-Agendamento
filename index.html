<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Adesão</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .form-container { max-width: 700px; background: #ffffff; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .section-title { border-bottom: 2px solid #0d6efd; padding-bottom: 5px; margin-top: 25px; margin-bottom: 15px; color: #0d6efd; }
        .required-star { color: red; }
    </style>
</head>
<body>

<div class="container my-5">
    <div class="form-container p-4 p-md-5 mx-auto">
        
        <img src="logo.png" alt="Logo da Empresa" class="d-block mx-auto mb-4 img-fluid" style="max-width: 200px;">
        
        <h2 class="text-center mb-4 fw-bold">Formulário de Contratação</h2>
        
        <form id="internetForm">
            
            <h4 class="section-title">Dados Pessoais</h4>
            <div class="mb-3">
                <label class="form-label">Nome completo <span class="required-star">*</span></label>
                <input type="text" id="nome" class="form-control" required>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">RG <span class="required-star">*</span></label>
                    <input type="text" id="rg" class="form-control" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">CPF <span class="required-star">*</span></label>
                    <input type="text" id="cpf" class="form-control" placeholder="000.000.000-00" required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Data de nascimento <span class="required-star">*</span></label>
                <input type="date" id="data_nascimento" class="form-control" required>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Telefone principal <span class="required-star">*</span></label>
                    <input type="tel" id="tel_principal" class="form-control" placeholder="(00) 00000-0000" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Telefone para recado <span class="required-star">*</span></label>
                    <input type="tel" id="tel_recado" class="form-control" placeholder="(00) 00000-0000" required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">E-mail <span class="required-star">*</span></label>
                <input type="email" id="email" class="form-control" placeholder="seuemail@exemplo.com" required>
            </div>

            <h4 class="section-title">Endereço</h4>
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">CEP <span class="required-star">*</span></label>
                    <input type="text" id="cep" class="form-control" placeholder="00000-000" required>
                </div>
                <div class="col-md-8 mb-3">
                    <label class="form-label">Rua <span class="required-star">*</span></label>
                    <input type="text" id="rua" class="form-control" required>
                </div>
            </div>
            <div class="row">
                <div class="col-md-8 mb-3">
                    <label class="form-label">Bairro <span class="required-star">*</span></label>
                    <input type="text" id="bairro" class="form-control" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Número da residência <span class="required-star">*</span></label>
                    <input type="text" id="numero" class="form-control" required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Ponto de referência</label>
                <input type="text" id="referencia" class="form-control">
            </div>
            <div class="mb-3">
                <label class="form-label d-block">Residência <span class="required-star">*</span></label>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="tipo_residencia" id="propria" value="Própria" required>
                    <label class="form-check-label" for="propria">Própria</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="tipo_residencia" id="alugada" value="Alugada">
                    <label class="form-check-label" for="alugada">Alugada</label>
                </div>
            </div>

            <h4 class="section-title">Preferência para Instalação</h4>
            <div class="mb-3">
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="instalacao" id="manha" value="Manhã" required>
                    <label class="form-check-label" for="manha">Manhã</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="instalacao" id="tarde" value="Tarde">
                    <label class="form-check-label" for="tarde">Tarde</label>
                </div>
            </div>

            <h4 class="section-title">Plano Desejado</h4>
            <div class="mb-3">
                <div class="form-check mb-2">
                    <input class="form-check-input" type="radio" name="plano" id="conecta" value="Conecta — 600MB" required>
                    <label class="form-check-label" for="conecta">Conecta — 600MB</label>
                </div>
                <div class="form-check mb-2">
                    <input class="form-check-input" type="radio" name="plano" id="power" value="Power — 800MB">
                    <label class="form-check-label" for="power">Power — 800MB</label>
                </div>
                <div class="form-check mb-2">
                    <input class="form-check-input" type="radio" name="plano" id="ultra" value="Ultra — 1GB">
                    <label class="form-check-label" for="ultra">Ultra — 1GB</label>
                </div>
            </div>

            <h4 class="section-title">Dia de Vencimento</h4>
            <div class="mb-3">
                <select id="vencimento" class="form-select" required>
                    <option value="" disabled selected>Escolha o dia...</option>
                    <option value="01">01</option>
                    <option value="05">05</option>
                    <option value="10">10</option>
                    <option value="15">15</option>
                    <option value="20">20</option>
                    <option value="25">25</option>
                    <option value="28">28</option>
                </select>
            </div>

            <h4 class="section-title">Tipo de Plano</h4>
            <div class="mb-3">
                <div class="form-check mb-2">
                    <input class="form-check-input" type="radio" name="fidelidade" id="com_fidelidade" value="Com fidelidade (instalação gratuita)" required onchange="toggleFormaPagamento()">
                    <label class="form-check-label" for="com_fidelidade">Com fidelidade (instalação gratuita)</label>
                </div>
                <div class="form-check mb-2">
                    <input class="form-check-input" type="radio" name="fidelidade" id="sem_fidelidade" value="Sem fidelidade (taxa de R$ 100,00)" onchange="toggleFormaPagamento()">
                    <label class="form-check-label" for="sem_fidelidade">Sem fidelidade (taxa de R$ 100,00)</label>
                </div>
            </div>

            <div id="secao_pagamento" style="display: none;">
                <h4 class="section-title">Forma de Pagamento <span class="required-star">*</span></h4>
                <p class="text-muted small">Obrigatório somente para planos sem fidelidade</p>
                <div class="mb-3">
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="pagamento" id="a_vista" value="À vista">
                        <label class="form-check-label" for="a_vista">À vista</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="pagamento" id="debito" value="Cartão de débito">
                        <label class="form-check-label" for="debito">Cartão de débito</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="pagamento" id="credito" value="Cartão de crédito">
                        <label class="form-check-label" for="credito">Cartão de crédito</label>
                    </div>
                </div>
            </div>

            <hr class="my-4">

            <button type="submit" class="btn btn-success btn-lg w-100 fw-bold py-3">🟢 FINALIZAR PEDIDO NO WHATSAPP</button>

        </form>
    </div>
</div>

<script>
    // Função para mostrar/esconder e gerenciar a obrigatoriedade da Forma de Pagamento
    function toggleFormaPagamento() {
        const semFidelidade = document.getElementById('sem_fidelidade').checked;
        const secaoPagamento = document.getElementById('secao_pagamento');
        const radiosPagamento = document.getElementsByName('pagamento');

        if (semFidelidade) {
            secaoPagamento.style.display = 'block';
            radiosPagamento.forEach(radio => radio.required = true);
        } else {
            secaoPagamento.style.display = 'none';
            radiosPagamento.forEach(radio => {
                radio.required = false;
                radio.checked = false;
            });
        }
    }

    // Evento de envio do formulário
    document.getElementById('internetForm').addEventListener('submit', function(event) {
        event.preventDefault();

        // Captura dos valores
        const nome = document.getElementById('nome').value;
        const rg = document.getElementById('rg').value;
        const cpf = document.getElementById('cpf').value;
        const data_nascimento = document.getElementById('data_nascimento').value.split('-').reverse().join('/');
        const tel_principal = document.getElementById('tel_principal').value;
        const tel_recado = document.getElementById('tel_recado').value;
        const email = document.getElementById('email').value;
        
        const cep = document.getElementById('cep').value;
        const rua = document.getElementById('rua').value;
        const bairro = document.getElementById('bairro').value;
        const numero = document.getElementById('numero').value;
        
        // Trata o ponto de referência se estiver vazio
        const campoReferencia = document.getElementById('referencia').value;
        const referencia = campoReferencia ? campoReferencia : "Não informado";
        
        const tipo_residencia = document.querySelector('input[name="tipo_residencia"]:checked').value;
        const instalacao = document.querySelector('input[name="instalacao"]:checked').value;
        const plano = document.querySelector('input[name="plano"]:checked').value;
        const vencimento = document.getElementById('vencimento').value;
        const fidelidade = document.querySelector('input[name="fidelidade"]:checked').value;
        
        const radioPagamento = document.querySelector('input[name="pagamento"]:checked');
        const pagamento = radioPagamento ? radioPagamento.value : "Não aplicável (Com fidelidade)";

        // Montagem da mensagem formatada para o WhatsApp
        let mensagem = `*NOVO PEDIDO DE ADESÃO*\n\n`;
        mensagem += `*DADOS PESSOAIS*\n`;
        mensagem += `• Nome completo: ${nome}\n`;
        mensagem += `• RG: ${rg}\n`;
        mensagem += `• CPF: ${cpf}\n`;
        mensagem += `• Data de nascimento: ${data_nascimento}\n\n`;
        mensagem += `• Telefone principal: ${tel_principal}\n`;
        mensagem += `• Telefone para recado: ${tel_recado}\n`;
        mensagem += `• E-mail: ${email}\n\n`;
        
        mensagem += `*ENDEREÇO*\n`;
        mensagem += `• CEP: ${cep}\n`;
        mensagem += `• Rua: ${rua}\n`;
        mensagem += `• Bairro: ${bairro}\n`;
        mensagem += `• Número da residência: ${numero}\n`;
        mensagem += `• Ponto de referência: ${referencia}\n`;
        mensagem += `• Residência: ${tipo_residencia}\n\n`;
        
        mensagem += `*PREFERÊNCIA PARA INSTALAÇÃO*\n`;
        mensagem += `• Período: ${instalacao}\n\n`;
        
        mensagem += `*PLANO DESEJADO*\n`;
        mensagem += `• Opção: ${plano}\n\n`;
        
        mensagem += `*DIA DE VENCIMENTO*\n`;
        mensagem += `• Dia: ${vencimento}\n\n`;
        
        mensagem += `*TIPO DE PLANO*\n`;
        mensagem += `• Fidelidade: ${fidelidade}\n`;
        mensagem += `• Forma de Pagamento: ${pagamento}\n`;

        // Codifica a mensagem para formato URL do WhatsApp
        const mensagemCodificada = encodeURIComponent(mensagem);
        
        // Link final do WhatsApp
        const urlWhatsapp = `https://wa.me/559294096411?text=${mensagemCodificada}`;
        
        // Abre o WhatsApp em nova aba
        window.open(urlWhatsapp, '_blank');
    });
</script>

</body>
</html>
